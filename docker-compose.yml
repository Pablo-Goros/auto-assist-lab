services:
  postgres:
    image: postgres:16-alpine
    container_name: autoassist-postgres
    environment:
      POSTGRES_USER: autoassist
      POSTGRES_PASSWORD: autoassist
      POSTGRES_DB: autoassist
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoassist -d autoassist"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
